{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celutamax</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

    <style>
    body {    
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f9;
    }

    /* NAVBAR */
    nav {
        background: #1f2937;
        padding: 15px;
        text-align: center;
    }

    nav a {
        color: white;
        margin: 0 12px;
        text-decoration: none;
        font-weight: 500;
        font-size: 16px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #f59e0b;
    }

    /* HERO SECTION */
    .hero{
        background-image: url("{% static 'images/mercedes.jpg' %}");
        background-size: cover;
        background-position: center;
        height: 400px;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        position: relative;
        text-align:center;
    }

    .hero-text{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
    }

    .hero-text h1{
        font-size:40px;
        margin-bottom:10px;
    }

    .btn{
        background:#f59e0b;
        padding:12px 25px;
        text-decoration:none;
        color:white;
        border-radius:6px;
    }

    /* FEATURED CARS */
    .featured{
        padding:40px;
        text-align:center;
    }

    .car-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
        padding:20px;
    }

    .car-card{
        background:white;
        border-radius:10px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .car-card img{
        width:100%;
        height:200px;
        object-fit:cover;
    }

    /* 🔍 MODERN SEARCH BAR */
    .search-container {
        display: flex;
        justify-content: center;
        margin: 30px 0;
    }

    .search-container input {
        width: 90%;
        max-width: 500px;
        padding: 14px 20px;
        border-radius: 30px;
        border: none;
        outline: none;
        font-size: 16px;
        background: #f1f5f9;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .search-container input:focus {
        background: white;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* 🖼️ IMAGE GALLERY */
    .car-gallery {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        overflow-x: auto;
    }

    .gallery-img {
        height: 100px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .gallery-img:hover {
        transform: scale(1.05);
    }

    /* 💬 WHATSAPP BUTTON */
    .whatsapp-btn {
        display: inline-block;
        background: #25D366;
        color: white;
        padding: 12px 18px;
        text-decoration: none;
        border-radius: 6px;
        font-size: 15px;
        margin: 6px;
        transition: 0.3s;
    }

    .whatsapp-btn:hover {
        background: #1ebe5d;
    }

    /* FOOTER */
    footer {
        background: #111827;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
    }
    </style>

</head>
<body>

<!-- NAVBAR -->
<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'vehicles' %}">Vehicles</a>
    <a href="{% url 'about' %}">About</a>
    <a href="{% url 'contact' %}">Contact</a>
</nav>

{% block content %}
{% endblock %}

<footer>
    © 2026 Celutamax Motors. All rights reserved.
</footer>

</body>
</html>
