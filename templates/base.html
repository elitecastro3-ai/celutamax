{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="sQ_woS8RGCIkx1a5-cBoxnXDTNSFyael1ey-szVRj6Q" />
    <title>Celutamax</title>
    <link rel="icon" type="image/png" href="{%static 'images/favicon.png' %}">
    <style>
    body {    
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f9;
                        
    }

    header {
        background: #111827;
        color: white;
        padding: 20px;
        text-align: center;
    }

    nav {
        background: #1f2937;
        padding: 12px;
        text-align: center;
    }

    nav a {
          color: white;
          margin: 0 15px;
          text-decoration: none;
          font-weight: bold;
      
    }

    nav a:hover{
        color:#f59e0b;
    }

    /* HERO SECTION */
   
    .hero{
      background-image: url("{% static 'images/mercedes.jpg' %}");
      background-size: cover;
      background-position: center;
      height: 400px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
    }
    .hero{
    position:relative;
    text-align:center;
    color:white;
    }

    .hero img{
    width:100%;
    height:420px;
    object-fit:cover;
    filter:brightness(60%);
    }

   .hero-text{
   position:absolute;
   top:50%;
   left:50%;
   transform:translate(-50%,-50%);
   }

   .hero-text h1{
   font-size:40px;
   margin-bottom:10px;
   }

   .btn{
   background:#f59e0b;
   padding:12px 25px;
   text-decoration:none;
   color:white;
   border-radius:6px;
   }

   /* FEATURED CARS */

   .featured{
   padding:40px;
   text-align:center;
   }

   .car-grid{
   display:grid;
   grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
   gap:20px;
   padding:20px;
   }

   .car-card{
   background:white;
   border-radius:10px;
   overflow:hidden;
   box-shadow:0 5px 15px rgba(0,0,0,0.1);
   }

   .car-card img{
   width:100%;
   height:200px;
   object-fit:cover;
   }

   footer {
       background: #111827;
       color: white;
       text-align: center;
       padding: 20px;
       margin-top: 40px;
   }
    </style>

</head>
<body>

<nav class="navbar">
    
    <div>

        <!-- Links -->
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'vehicles' %}">Vehicles</a>
        <a href="{% url 'about' %}">About</a>
        <a href="{% url 'contact' %}">Contact</a>
    </div>

</nav>


{% block content %}
{% endblock %}

<footer>
    © 2026 Celutamax Motors. All rights reserved.
</footer>

</body>
</html>
